<h1>JSOG Déplacements</h1>

<form method="POST">
<input type="date" name="date">
<input name="lieu" placeholder="Lieu">
<input name="km" placeholder="Km">
<button>Ajouter</button>
</form>

<hr>

{% for mois, liste in frais_par_mois.items() %}
<h2>{{ mois }}</h2>

{% for f in liste %}
<p>{{ f.date }} - {{ f.lieu }} - {{ f.km }} km - {{ f.montant }} €</p>
{% endfor %}

<a href="/pdf/{{ mois }}">PDF</a>

<hr>
{% endfor %}

<a href="/logout">Logout</a>
